<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Notificaciones</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <main class="phone">
    <section class="pull-to-refresh">
      <div class="spinner-border" role="status"></div>
    </section>

    <section class="screen white-screen">
      <header class="app-header red">
        <a class="icon-btn" href="home.html" aria-label="Volver">
          <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="page-title">Notificaciones</h1>
        <button class="icon-btn" type="button" onclick="marcarTodo()" aria-label="Marcar">
          <i class="fa-solid fa-check-double"></i>
        </button>
      </header>

      <div class="page-content">
        <div class="notification-list" id="listaNotificaciones">
          <article class="notification-item">
            <a class="notification-profile-link" href="perfilDeTercer.html" aria-label="Abrir perfil de YD">
              <img src="img/image 20.png" alt="YD">
            </a>
            <div>
              <a class="notification-text-link" href="perfilDeTercer.html">
              <strong>YD le dio like a tu rese&ntilde;a</strong>
              </a>
              <p>Halo - hace 5 min</p>
            </div>
            <img src="img/image 7.png" class="album-mini" alt="Halo">
          </article>

          <article class="notification-item">
            <img src="img/image 9.png" alt="Xio">
            <div>
              <strong>Xio coment&oacute; en tu publicaci&oacute;n</strong>
              <p>Imaginal Disk - hace 12 min</p>
            </div>
            <img src="img/image 8.png" class="album-mini" alt="Imaginal Disk">
          </article>

          <article class="notification-item">
            <img src="img/image 23.png" alt="Usuario">
            <div>
              <strong>Nuevo seguidor</strong>
              <p>Ahora sigue tus rese&ntilde;as</p>
            </div>
            <img src="img/Money Trees 1.png" class="album-mini" alt="Good Kid">
          </article>
        </div>

        <p class="message dark" id="notiMensaje"></p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="home.html">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a href="discover.html">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Navegar</span>
      </a>
      <a href="nuevaPublicacion.html" class="nav-plus" aria-label="Nueva publicacion">
        <i class="fa-solid fa-plus"></i>
        <span>Crear</span>
      </a>
      <a href="chats.html">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Chats</span>
      </a>
      <a href="perfilPersonal.html">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>
    </nav>
  </main>

  <script>
    const pullToRefresh = document.querySelector('.pull-to-refresh');
    let touchstartY = 0;

    document.addEventListener('touchstart', function(e) {
      touchstartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', function(e) {
      const touchY = e.touches[0].clientY;
      const touchDiff = touchY - touchstartY;
      if (touchDiff > 0 && window.scrollY === 0) {
        pullToRefresh.classList.add('verse');
        e.preventDefault();
      }
    });

    document.addEventListener('touchend', function() {
      if (pullToRefresh.classList.contains('verse')) {
        pullToRefresh.classList.remove('verse');
        location.reload();
      }
    });

    function marcarTodo() {
      var lista = document.getElementById('listaNotificaciones');
      var mensaje = document.getElementById('notiMensaje');
      lista.style.opacity = '0.45';
      mensaje.innerHTML = 'Notificaciones marcadas como vistas.';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>

</html>
