<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Recuperar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone">
    <section class="screen auth-screen active">
      <a class="back-btn" href="logIn.html">&lt;</a>
      <div class="auth-content top-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>Restablecer contrase&ntilde;a</h2>
        <p class="helper-text">Dinos el correo con el que te registraste y te mandaremos un codigo para recuperar tu cuenta.</p>

        <form id="recuperarForm">
          <label for="recuperarCorreo">Correo</label>
          <input type="email" id="recuperarCorreo" class="input-bpm">
          <p class="message" id="recuperarMessage"></p>
          <button class="main-btn" type="submit">Solicitar codigo</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('recuperarForm').onsubmit = function(e) {
      e.preventDefault();
      var correo = document.getElementById('recuperarCorreo').value;
      var mensaje = document.getElementById('recuperarMessage');

      if (correo === '') {
        mensaje.innerHTML = 'Escribe tu correo.';
      } else {
        mensaje.innerHTML = '';
        window.location.href = 'codigo.html';
      }
    };
  </script>
</body>
</html>
