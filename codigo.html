<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Codigo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone">
    <section class="screen auth-screen active">
      <a class="back-btn" href="recuperar.html">&lt;</a>
      <div class="auth-content top-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>Codigo de verificaci&oacute;n</h2>
        <p class="helper-text">Ingresa el codigo de 4 digitos enviado a tu correo.</p>

        <form id="codigoForm">
          <div class="change">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code1">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code2">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code3">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code4">
          </div>
          <p class="message" id="codigoMessage"></p>
          <button class="main-btn" type="submit">Verificar</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    var container = document.getElementsByClassName('change')[0];
    container.onkeyup = function(e) {
      var target = e.srcElement || e.target;
      var maxLength = parseInt(target.attributes['maxlength'].value, 10);
      var myLength = target.value.length;
      if (myLength >= maxLength) {
        var next = target;
        while (next = next.nextElementSibling) {
          if (next == null) {
            break;
          }
          if (next.tagName.toLowerCase() == 'input') {
            next.focus();
            break;
          }
        }
      }
    };

    document.getElementById('codigoForm').onsubmit = function(e) {
      e.preventDefault();
      window.location.href = 'reset.html';
    };
  </script>
</body>
</html>
