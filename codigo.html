<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Codigo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <main class="phone">
    <section class="screen auth-screen active">
      <a class="back-btn" href="recuperar.html">&lt;</a>
      <div class="auth-content top-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>Codigo de verificaci&oacute;n</h2>
        <p class="helper-text">Ingresa el codigo de 4 digitos enviado a tu correo.</p>

        <form id="codigoForm">
          <div class="change">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code1">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code2">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code3">
            <input class="code" type="text" maxlength="1" minlength="1" aria-label="code4">
          </div>
          <p class="message" id="codigoMessage"></p>
          <button class="main-btn" type="submit">Verificar</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    var container = document.getElementsByClassName('change')[0];
    container.onkeyup = function(e) {
      var target = e.srcElement || e.target;
      var maxLength = parseInt(target.attributes['maxlength'].value, 10);
      var myLength = target.value.length;
      if (myLength >= maxLength) {
        var next = target;
        while (next = next.nextElementSibling) {
          if (next == null) {
            break;
          }
          if (next.tagName.toLowerCase() == 'input') {
            next.focus();
            break;
          }
        }
      }
    };

    document.getElementById('codigoForm').onsubmit = function(e) {
      e.preventDefault();
      window.location.href = 'reset.html';
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>
</html>
