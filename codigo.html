<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BPM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container-fluid pantalla">

        <div class="contenido">

            <a href="recuperar.html" class="volver">
                ←
            </a>

            <div class="change text-center">

                <input class="code" type="text" maxlength="1" minlength="1">

                <input class="code" type="text" maxlength="1" minlength="1">

                <input class="code" type="text" maxlength="1" minlength="1">

                <input class="code" type="text" maxlength="1" minlength="1">

            </div>

            <div class="teclado">

                <div class="fila">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>

                <div class="fila">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>

                <div class="fila">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>

                <div class="fila">
                    <button>0</button>
                </div>

            </div>

        </div>

    </div>

    <script>

        var container =
            document.getElementsByClassName("change")[0];

        container.onkeyup = function (e) {
            var target = e.srcElement;

            var maxLength =
                parseInt(
                    target.attributes["maxlength"].value,
                    10
                );

            var myLength =
                target.value.length;

            if (myLength >= maxLength) {
                var next = target;

                while (next = next.nextElementSibling) {
                    if (next == null)
                        break;

                    if (next.tagName.toLowerCase()
                        == "input") {
                        next.focus();
                        break;
                    }
                }
            }
        }

    </script>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
