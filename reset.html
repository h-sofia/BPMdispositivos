<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Reset</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <main class="phone">
    <section class="screen auth-screen active">
      <a class="back-btn" href="codigo.html">&lt;</a>
      <div class="auth-content top-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>Nueva contrase&ntilde;a</h2>

        <form id="resetForm">
          <label for="resetPassword">Contrase&ntilde;a</label>
          <input type="password" id="resetPassword" class="input-bpm">

          <label for="resetConfirm">Confirmaci&oacute;n</label>
          <input type="password" id="resetConfirm" class="input-bpm">

          <p class="message" id="resetMessage"></p>
          <button class="main-btn" type="submit">Guardar contrase&ntilde;a</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('resetForm').onsubmit = function(e) {
      e.preventDefault();
      var password = document.getElementById('resetPassword').value;
      var confirmacion = document.getElementById('resetConfirm').value;
      var mensaje = document.getElementById('resetMessage');

      if (password === '' || confirmacion === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else if (password !== confirmacion) {
        mensaje.innerHTML = 'Las contrase&ntilde;as no coinciden.';
      } else {
        alert('Contrase&ntilde;a actualizada');
        window.location.href = 'logIn.html';
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>
</html>
