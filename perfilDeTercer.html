<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Perfil YD</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <main class="phone">
    <section class="pull-to-refresh">
      <div class="spinner-border" role="status"></div>
    </section>

    <section class="screen white-screen">
      <header class="profile-hero">
        <div class="profile-top">
          <img src="img/image 20.png" class="profile-photo" alt="YD">
          <div>
            <h1 class="profile-name">YD</h1>
            <p class="profile-user">@yd_21</p>
            <button class="follow-btn" type="button" onclick="seguir(this)">Seguir</button>
            <div class="profile-stats mt-2">
              <span>Seguidorxs 7</span>
              <span>Seguidxs 25</span>
            </div>
          </div>
          <a class="icon-btn" href="chats.html" aria-label="Mensaje">
            <i class="fa-regular fa-paper-plane"></i>
          </a>
        </div>
      </header>

      <div class="page-content">
        <h2 class="section-title small">Favoritos</h2>
        <div class="album-strip">
          <img src="img/image 7.png" alt="Halo">
          <img src="img/image 18.png" alt="Album favorito">
          <img src="img/image 19.png" alt="Album favorito">
          <img src="img/image 21.png" alt="Album favorito">
        </div>

        <h2 class="section-title small">Reciente</h2>
        <div class="recent-list">
          <article class="recent-item">
            <img src="img/image 22.png" alt="Aftermaths">
            <div>
              <h3>Aftermaths</h3>
              <p>Porter</p>
              <div class="mini-stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
              </div>
            </div>
            <button class="heart-btn" type="button" onclick="toggleLike(this)" aria-label="Me gusta">
              <i class="fa-regular fa-heart"></i>
            </button>
          </article>

          <article class="recent-item">
            <img src="img/image 15.png" alt="Siamese Dream">
            <div>
              <h3>Siamese Dream</h3>
              <p>The Smashing Pumpkins</p>
              <div class="mini-stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
              </div>
            </div>
            <button class="heart-btn" type="button" onclick="toggleLike(this)" aria-label="Me gusta">
              <i class="fa-regular fa-heart"></i>
            </button>
          </article>

          <article class="recent-item">
            <img src="img/image 17.png" alt="When the pawn">
            <div>
              <h3>When the pawn...</h3>
              <p>Fiona Apple</p>
              <div class="mini-stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-regular fa-star"></i>
                <i class="fa-regular fa-star"></i>
              </div>
            </div>
            <button class="heart-btn" type="button" onclick="toggleLike(this)" aria-label="Me gusta">
              <i class="fa-regular fa-heart"></i>
            </button>
          </article>
        </div>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="home.html">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a href="discover.html">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Navegar</span>
      </a>
      <a href="nuevaPublicacion.html" class="nav-plus" aria-label="Nueva publicacion">
        <i class="fa-solid fa-plus"></i>
        <span>Crear</span>
      </a>
      <a href="chats.html">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Chats</span>
      </a>
      <a href="perfilPersonal.html">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>
    </nav>
  </main>

  <script>
    const pullToRefresh = document.querySelector('.pull-to-refresh');
    let touchstartY = 0;

    document.addEventListener('touchstart', function(e) {
      touchstartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', function(e) {
      const touchY = e.touches[0].clientY;
      const touchDiff = touchY - touchstartY;
      if (touchDiff > 0 && window.scrollY === 0) {
        pullToRefresh.classList.add('verse');
        e.preventDefault();
      }
    });

    document.addEventListener('touchend', function() {
      if (pullToRefresh.classList.contains('verse')) {
        pullToRefresh.classList.remove('verse');
        location.reload();
      }
    });

    function seguir(boton) {
      if (boton.innerHTML === 'Seguir') {
        boton.innerHTML = 'Siguiendo';
      } else {
        boton.innerHTML = 'Seguir';
      }
    }

    function toggleLike(boton) {
      if (boton.className.indexOf('liked') > -1) {
        boton.className = boton.className.replace(' liked', '');
        boton.innerHTML = '<i class="fa-regular fa-heart"></i>';
      } else {
        boton.className += ' liked';
        boton.innerHTML = '<i class="fa-solid fa-heart"></i>';
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>

</html>
