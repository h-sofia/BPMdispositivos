<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Iniciar sesion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone">
    <section class="pull-to-refresh">
      <div class="spinner-border" role="status"></div>
    </section>

    <section class="screen auth-screen active">
      <div class="auth-content">
        <img src="img/logo.png" class="auth-logo" alt="logo BPM">
        <h1>BPM</h1>

        <form id="loginForm">
          <label for="loginUser">Correo o nombre de usuario</label>
          <input type="text" id="loginUser" class="input-bpm">

          <label for="loginPassword">Contrase&ntilde;a</label>
          <input type="password" id="loginPassword" class="input-bpm">

          <a class="simple-link" href="recuperar.html">&iquest;Olvidaste tu contrase&ntilde;a?</a>

          <p class="message" id="loginMessage"></p>

          <button class="main-btn" type="submit">Iniciar Sesi&oacute;n</button>
          <a class="simple-link big-link" href="registro.html">Registrarse</a>
        </form>
      </div>
    </section>
  </main>

  <script>
    const pullToRefresh = document.querySelector('.pull-to-refresh');
    let touchstartY = 0;

    document.addEventListener('touchstart', function(e) {
      touchstartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', function(e) {
      const touchY = e.touches[0].clientY;
      const touchDiff = touchY - touchstartY;
      if (touchDiff > 0 && window.scrollY === 0) {
        pullToRefresh.classList.add('verse');
        e.preventDefault();
      }
    });

    document.addEventListener('touchend', function() {
      if (pullToRefresh.classList.contains('verse')) {
        pullToRefresh.classList.remove('verse');
        location.reload();
      }
    });

    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      var usuario = document.getElementById('loginUser').value;
      var password = document.getElementById('loginPassword').value;
      var mensaje = document.getElementById('loginMessage');

      if (usuario === '' || password === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else {
        mensaje.innerHTML = '';
        window.location.href = 'home.html';
      }
    };
  </script>
</body>
</html>
