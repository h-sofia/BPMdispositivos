<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <section class="pull-to-refresh">
    <div class="spinner-border" role="status"></div>
  </section>

  <main class="container-fluid pantalla auth-page">
    <section class="contenido">
      <img src="img/logo.png" class="logo" alt="logo BPM">
      <h1 class="marca">BPM</h1>

      <form id="loginForm" novalidate>
        <label for="loginUser">Correo o nombre de usuario</label>
        <input type="text" id="loginUser" class="form-control custom-input" autocomplete="username">

        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" class="form-control custom-input" autocomplete="current-password">

        <a href="recuperar.html" class="link-bpm link-left">¿Olvidaste tu contraseña?</a>

        <p class="mensaje" id="loginMessage" aria-live="polite"></p>

        <div class="text-center">
          <button class="btn btn-bpm" type="submit">Iniciar Sesión</button>
        </div>

        <div class="text-center mt-4">
          <a href="registro.html" class="link-bpm link-strong">Registrarse</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const pullToRefresh = document.querySelector('.pull-to-refresh');
    let touchstartY = 0;

    document.addEventListener('touchstart', function(e) {
      touchstartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', function(e) {
      const touchY = e.touches[0].clientY;
      const touchDiff = touchY - touchstartY;
      if (touchDiff > 0 && window.scrollY === 0) {
        pullToRefresh.classList.add('seen');
        e.preventDefault();
      }
    });

    document.addEventListener('touchend', function() {
      if (pullToRefresh.classList.contains('seen')) {
        pullToRefresh.classList.remove('seen');
        location.reload();
      }
    });

    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();

      const usuario = document.getElementById('loginUser').value;
      const password = document.getElementById('loginPassword').value;
      const mensaje = document.getElementById('loginMessage');

      if (usuario === '' || password === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else {
        mensaje.innerHTML = '';
        window.location.href = 'home.html';
      }
    };
  </script>
</body>
</html>
