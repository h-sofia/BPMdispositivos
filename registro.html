<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Registro</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <main class="phone">
    <section class="pull-to-refresh">
      <div class="spinner-border" role="status"></div>
    </section>

    <section class="screen auth-screen active">
      <a class="back-btn" href="logIn.html">&lt;</a>
      <div class="auth-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>BPM</h2>

        <form id="registroForm">
          <label for="registroCorreo">Correo</label>
          <input type="email" id="registroCorreo" class="input-bpm">

          <label for="registroUsuario">Nombre de usuario</label>
          <input type="text" id="registroUsuario" class="input-bpm">

          <label for="registroPassword">Contrase&ntilde;a</label>
          <input type="password" id="registroPassword" class="input-bpm">

          <p class="message" id="registroMessage"></p>
          <button class="main-btn" type="submit">Registrarse</button>
          <a class="simple-link big-link" href="logIn.html">Iniciar sesi&oacute;n</a>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('registroForm').onsubmit = function(e) {
      e.preventDefault();
      var correo = document.getElementById('registroCorreo').value;
      var usuario = document.getElementById('registroUsuario').value;
      var password = document.getElementById('registroPassword').value;
      var mensaje = document.getElementById('registroMessage');

      if (correo === '' || usuario === '' || password === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else {
        alert('Registro exitoso');
        window.location.href = 'logIn.html';
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>
</html>
