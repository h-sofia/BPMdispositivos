<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BPM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container-fluid pantalla">

        <div class="contenido">

            <img src="img/logo.png" class="logo-pequeno">

            <h2 class="titulo-bpm">BPM</h2>

            <form>

                <label>CORREO</label>
                <input type="email" class="form-control custom-input">

                <label>NOMBRE DE USUARIO</label>
                <input type="text" class="form-control custom-input">

                <label>CONTRASEÑA</label>
                <input type="password" class="form-control custom-input">

                <div class="text-center">

                    <button class="btn btn-bpm">
                        Registrarse
                    </button>

                </div>

                <div class="text-center mt-3">

                    <a href="login.html" class="link-bpm">
                        Iniciar sesión
                    </a>

                </div>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
