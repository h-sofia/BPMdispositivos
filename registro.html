<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone">
    <section class="pull-to-refresh">
      <div class="spinner-border" role="status"></div>
    </section>

    <section class="screen auth-screen active">
      <a class="back-btn" href="logIn.html">&lt;</a>
      <div class="auth-content">
        <img src="img/logo.png" class="auth-logo small" alt="logo BPM">
        <h2>BPM</h2>

        <form id="registroForm">
          <label for="registroCorreo">Correo</label>
          <input type="email" id="registroCorreo" class="input-bpm">

          <label for="registroUsuario">Nombre de usuario</label>
          <input type="text" id="registroUsuario" class="input-bpm">

          <label for="registroPassword">Contrase&ntilde;a</label>
          <input type="password" id="registroPassword" class="input-bpm">

          <p class="message" id="registroMessage"></p>
          <button class="main-btn" type="submit">Registrarse</button>
          <a class="simple-link big-link" href="logIn.html">Iniciar sesi&oacute;n</a>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('registroForm').onsubmit = function(e) {
      e.preventDefault();
      var correo = document.getElementById('registroCorreo').value;
      var usuario = document.getElementById('registroUsuario').value;
      var password = document.getElementById('registroPassword').value;
      var mensaje = document.getElementById('registroMessage');

      if (correo === '' || usuario === '' || password === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else {
        alert('Registro exitoso');
        window.location.href = 'logIn.html';
      }
    };
  </script>
</body>
</html>
