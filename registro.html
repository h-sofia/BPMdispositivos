<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPM | Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="registro">
  <section class="pull-to-refresh">
    <div class="spinner-border" role="status"></div>
  </section>

  <main class="container-fluid pantalla auth-page">
    <section class="contenido">
      <img src="img/logo.png" class="logo-pequeno" alt="logo BPM">
      <h2 class="titulo-bpm">BPM</h2>

      <form id="registroForm" novalidate>
        <label for="registroCorreo">Correo</label>
        <input type="email" id="registroCorreo" class="form-control custom-input" autocomplete="email">

        <label for="registroUsuario">Nombre de usuario</label>
        <input type="text" id="registroUsuario" class="form-control custom-input" autocomplete="username">

        <label for="registroPassword">Contraseña</label>
        <input type="password" id="registroPassword" class="form-control custom-input" autocomplete="new-password">

        <p class="mensaje" id="registroMessage" aria-live="polite"></p>

        <div class="text-center">
          <button class="btn btn-bpm" type="submit">Registrarse</button>
        </div>

        <div class="text-center mt-3">
          <a href="logIn.html" class="link-bpm">Iniciar sesión</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const pullToRefresh = document.querySelector('.pull-to-refresh');
    let touchstartY = 0;

    document.addEventListener('touchstart', function(e) {
      touchstartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', function(e) {
      const touchY = e.touches[0].clientY;
      const touchDiff = touchY - touchstartY;
      if (touchDiff > 0 && window.scrollY === 0) {
        pullToRefresh.classList.add('seen');
        e.preventDefault();
      }
    });

    document.addEventListener('touchend', function() {
      if (pullToRefresh.classList.contains('seen')) {
        pullToRefresh.classList.remove('seen');
        location.reload();
      }
    });

    document.getElementById('registroForm').onsubmit = function(e) {
      e.preventDefault();

      const correo = document.getElementById('registroCorreo').value;
      const usuario = document.getElementById('registroUsuario').value;
      const password = document.getElementById('registroPassword').value;
      const mensaje = document.getElementById('registroMessage');

      if (correo === '' || usuario === '' || password === '') {
        mensaje.innerHTML = 'Completa todos los campos.';
      } else {
        alert('Registro exitoso');
        window.location.href = 'logIn.html';
      }
    };
  </script>
</body>
</html>
